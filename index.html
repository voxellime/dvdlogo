<!DOCTYPE html>
<html>
<head>
  <title>Launcher</title>
  <style>
    /* Center everything vertically and horizontally */
    body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial, sans-serif;
      background-color: #121212;
      color: #ffffff;
      margin: 0;
    }

    /* Text above the button */
    .warning {
      margin-bottom: 20px;
      font-size: 18px;
      color: #ff5555;
    }

    /* The button */
    button {
      background: linear-gradient(145deg, #ff9900, #ffcc00);
      border: none;
      border-radius: 12px;
      padding: 15px 40px;
      font-size: 20px;
      font-weight: bold;
      color: #121212;
      cursor: pointer;
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
      transition: all 0.2s ease-in-out;
      text-transform: uppercase;
    }

    /* Hover effect */
    button:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 20px rgba(0,0,0,0.4);
    }

    /* Text below the button */
    .footer {
      margin-top: 20px;
      font-size: 14px;
      color: #888;
    }
  </style>
</head>
<body>
  <div class="warning">Does not work on Linux</div>

  <button onclick="launch()">Launch DVD Logo</button>

  <div class="footer">Made by voxellime</div>

  <script>
    function launch() {
      window.open(
        "popup.html",
        "bouncer",
        "width=220,height=160,resizable=no"
      );

      // Give popup ownership, then close this tab
      setTimeout(() => {
        window.open('', '_self');
        window.close();
      }, 300);
    }
  </script>
</body>
</html>
